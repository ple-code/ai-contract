services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mingheng}
      POSTGRES_USER: ${POSTGRES_USER:-mingheng}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mingheng"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./app/api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mingheng}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mingheng}
      UPLOAD_DIR: /data/uploads
    ports:
      - "8000:8000"
    volumes:
      - uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build: ./app/web
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
