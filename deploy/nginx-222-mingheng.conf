# 222 公网入口：反代到 e540 上的明衡 web（docker-compose.prod web :8088）
# 安装：sudo cp deploy/nginx-222-mingheng.conf /etc/nginx/sites-available/mingheng-app
#       sudo ln -sf /etc/nginx/sites-available/mingheng-app /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 8090;
    listen [::]:8090;
    server_name _;

    client_max_body_size 50m;

    location / {
        proxy_pass http://100.64.247.48:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }
}
